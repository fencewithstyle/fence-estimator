<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Fence with Style - Estimator Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1B7752;
            --primary-light: #2D9668;
            --primary-dark: #0F4D35;
            --secondary: #8FBC5A;
            --accent: #FF8552;
            --accent-dark: #E65C1F;
            --bg: #F5F7F4;
            --surface: #FFFFFF;
            --text: #1A1A1A;
            --text-muted: #6B7280;
            --border: #D1D5DB;
            --shadow: rgba(27, 119, 82, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #E8EDE6 100%);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 12px;
        }

        /* Header */
        .brand-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px var(--shadow);
        }

        .brand-header::after {
            content: '';
            display: block;
            height: 3px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--secondary) 100%);
            margin-top: 12px;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .logo-container {
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .logo-container img {
            height: 40px;
            width: auto;
        }

        .estimator-subtitle {
            font-size: 14px;
            color: white;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 16px;
            border-radius: 20px;
        }

        /* Main Layout */
        .main-content {
            display: grid;
            gap: 16px;
        }

        @media (min-width: 768px) {
            .main-content {
                grid-template-columns: 340px 1fr;
            }
            .container {
                padding: 20px;
            }
            .brand-header {
                padding: 24px 32px;
            }
            .logo-container img {
                height: 50px;
            }
        }

        .panel {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .panel-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .panel-title::before {
            content: '';
            width: 3px;
            height: 18px;
            background: linear-gradient(180deg, var(--accent) 0%, var(--primary) 100%);
        }

        /* Property Type */
        .property-type-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .property-type-btn {
            padding: 10px 8px;
            border: 2px solid var(--border);
            background: var(--surface);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
        }

        .property-type-btn:active {
            transform: scale(0.95);
        }

        .property-type-btn.active {
            background: var(--secondary);
            border-color: var(--secondary);
            color: white;
        }

        /* Fence Type Selector */
        .fence-type-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .fence-type-btn {
            padding: 10px 8px;
            border: 2px solid var(--border);
            background: var(--surface);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
        }

        .fence-type-btn:active {
            transform: scale(0.95);
        }

        .fence-type-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .fence-type-other {
            grid-column: span 2;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .fence-type-other input {
            flex: 1;
            padding: 8px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
        }

        /* Color Selector */
        .color-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid var(--border);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .color-btn:active {
            transform: scale(0.9);
        }

        .color-btn.active {
            border-color: var(--primary);
            border-width: 4px;
            box-shadow: 0 0 0 2px white, 0 0 0 4px var(--primary);
        }

        .color-btn.black { background: #000000; }
        .color-btn.white { background: #FFFFFF; border-color: #999; }
        .color-btn.bronze { background: #3D3026; }
        
        .color-other-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-other-input {
            width: 80px;
            padding: 8px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 11px;
        }

        /* Gate Type Selector */
        .gate-types {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .gate-type-btn {
            padding: 10px 6px;
            border: 2px solid var(--border);
            background: var(--surface);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-height: 65px;
        }

        .gate-type-btn:active {
            transform: scale(0.95);
        }

        .gate-type-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .gate-type-btn svg {
            width: 28px;
            height: 28px;
        }

        .gate-type-btn.active svg {
            fill: white;
            stroke: white;
        }

        .gate-type-label {
            font-size: 10px;
            font-weight: 600;
            text-align: center;
        }

        /* Gate Direction */
        .gate-direction-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .gate-direction-btn {
            padding: 10px;
            border: 2px solid var(--border);
            background: var(--surface);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
        }

        .gate-direction-btn:active {
            transform: scale(0.95);
        }

        .gate-direction-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Tools */
        .tools {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tool-btn {
            padding: 12px 14px;
            border: 2px solid var(--border);
            background: var(--surface);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
        }

        .tool-btn:active {
            transform: scale(0.97);
        }

        .tool-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border-color: var(--primary);
        }

        .tool-icon {
            width: 18px;
            height: 18px;
        }

        /* Canvas */
        .canvas-container {
            position: relative;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px var(--shadow);
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(27, 119, 82, 0.06) 19px, rgba(27, 119, 82, 0.06) 20px),
                repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(27, 119, 82, 0.06) 19px, rgba(27, 119, 82, 0.06) 20px);
        }

        /* Measurements */
        .measurements {
            display: grid;
            gap: 10px;
            margin-top: 12px;
        }

        .measurement-card {
            background: linear-gradient(135deg, #F0F7ED 0%, white 100%);
            padding: 14px;
            border-radius: 10px;
            border: 2px solid var(--border);
            position: relative;
        }

        .measurement-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary) 0%, var(--accent) 100%);
        }

        .measurement-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .measurement-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            font-family: 'JetBrains Mono', monospace;
            line-height: 1;
        }

        .measurement-unit {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            margin-top: 2px;
        }

        /* Detail Lists */
        .detail-list {
            margin-top: 12px;
        }

        .detail-item {
            padding: 10px;
            background: linear-gradient(135deg, #FFF5F0 0%, white 100%);
            border-radius: 8px;
            margin-bottom: 8px;
            border: 2px solid var(--border);
            font-size: 12px;
        }

        .detail-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .detail-item-meta {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Action Buttons */
        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
        }

        .btn-secondary {
            background: white;
            color: var(--text);
            border: 2px solid var(--border);
        }

        .checkbox-control {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: var(--bg);
            border-radius: 8px;
            margin-bottom: 12px;
            border: 2px solid var(--border);
        }

        .checkbox-control input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .checkbox-control label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            flex: 1;
        }

        .coordinates {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(27, 119, 82, 0.95);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            pointer-events: none;
        }

        .snap-indicator {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(143, 188, 90, 0.95);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .snap-indicator.active {
            opacity: 1;
        }

        /* Gate Type Visual Indicator */
        .gate-visual-indicator {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(239, 68, 68, 0.95);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            display: none;
        }

        .gate-visual-indicator.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-header">
            <div class="header-content">
                <div class="logo-container">
                    <img src="fence-logo.jpg" alt="Fence with Style">
                </div>
                <div class="estimator-subtitle">Professional Estimator Tool</div>
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <div class="panel-title">
                    🏘️ Property Type
                </div>
                <div class="property-type-grid">
                    <button class="property-type-btn active" data-property-type="single">Single Family</button>
                    <button class="property-type-btn" data-property-type="multifamily">Multifamily</button>
                    <button class="property-type-btn" data-property-type="commercial">Commercial</button>
                    <button class="property-type-btn" data-property-type="other">Other</button>
                </div>

                <div class="panel-title" style="margin-top: 16px;">
                    🏗️ Fence Type
                </div>
                <div class="fence-type-grid">
                    <button class="fence-type-btn active" data-fence-type="PVC">PVC</button>
                    <button class="fence-type-btn" data-fence-type="Aluminum">Aluminum</button>
                    <button class="fence-type-btn" data-fence-type="Aluminum Pickets">Aluminum Pickets</button>
                    <button class="fence-type-btn" data-fence-type="DuraFence">DuraFence</button>
                    <button class="fence-type-btn" data-fence-type="Chainlink">Chainlink</button>
                    <button class="fence-type-btn" data-fence-type="Wood">Wood</button>
                    <button class="fence-type-btn" data-fence-type="Wood Composite">Wood Composite</button>
                    <div class="fence-type-other">
                        <button class="fence-type-btn" data-fence-type="Other">Other:</button>
                        <input type="text" id="fenceTypeOther" placeholder="Type here..." />
                    </div>
                </div>

                <div class="panel-title" style="margin-top: 16px;">
                    🎨 Color
                </div>
                <div class="color-selector">
                    <button class="color-btn black active" data-color="#000000" title="Black"></button>
                    <button class="color-btn white" data-color="#FFFFFF" title="White"></button>
                    <button class="color-btn bronze" data-color="#3D3026" title="Bronze"></button>
                    <div class="color-other-wrapper">
                        <input type="color" id="colorOther" class="color-other-input" value="#666666" />
                        <span style="font-size: 11px; font-weight: 600;">Other</span>
                    </div>
                </div>

                <div class="checkbox-control">
                    <input type="checkbox" id="snapToggle" checked>
                    <label for="snapToggle">Snap to Grid</label>
                </div>

                <div class="panel-title" style="margin-top: 16px;">
                    🚪 Gate Type
                </div>
                <div class="gate-types">
                    <button class="gate-type-btn active" data-gate-type="single">
                        <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="8" y="5" width="24" height="30" rx="2"/>
                            <line x1="20" y1="18" x2="20" y2="22"/>
                        </svg>
                        <span class="gate-type-label">Single</span>
                    </button>
                    <button class="gate-type-btn" data-gate-type="double">
                        <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="6" y="5" width="13" height="30" rx="2"/>
                            <rect x="21" y="5" width="13" height="30" rx="2"/>
                            <line x1="13" y1="18" x2="13" y2="22"/>
                            <line x1="27" y1="18" x2="27" y2="22"/>
                        </svg>
                        <span class="gate-type-label">Double</span>
                    </button>
                    <button class="gate-type-btn" data-gate-type="sliding">
                        <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="8" y="5" width="24" height="30" rx="2"/>
                            <line x1="32" y1="35" x2="35" y2="35" stroke-width="3"/>
                            <path d="M 5 20 L 10 18 L 10 22 Z" fill="currentColor"/>
                        </svg>
                        <span class="gate-type-label">Sliding</span>
                    </button>
                </div>

                <div class="panel-title" style="margin-top: 16px;">
                    ↔️ Gate Direction
                </div>
                <div class="gate-direction-grid">
                    <button class="gate-direction-btn active" data-direction="Inside">↓ Inside</button>
                    <button class="gate-direction-btn" data-direction="Outside">↑ Outside</button>
                    <button class="gate-direction-btn" data-direction="Left">← Left</button>
                    <button class="gate-direction-btn" data-direction="Right">Right →</button>
                </div>

                <div class="panel-title" style="margin-top: 16px;">
                    🛠️ Tools
                </div>
                <div class="tools">
                    <button class="tool-btn active" data-tool="fence">
                        <span class="tool-icon">━</span>
                        <span>Draw Fence Line</span>
                    </button>
                    <button class="tool-btn" data-tool="gate">
                        <span class="tool-icon">⊟</span>
                        <span>Add Gate</span>
                    </button>
                    <button class="tool-btn" data-tool="measure">
                        <span class="tool-icon">📏</span>
                        <span>Measure Distance</span>
                    </button>
                    <button class="tool-btn" data-tool="delete">
                        <span class="tool-icon">🗑️</span>
                        <span>Delete Element</span>
                    </button>
                </div>

                <div class="action-btns">
                    <button class="btn btn-secondary" id="clearBtn">Clear All</button>
                    <button class="btn btn-primary" id="exportBtn">Export PDF</button>
                </div>

                <div class="panel-title" style="margin-top: 16px;">
                    🔢 Canvas Controls
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-secondary" id="undoBtn" disabled style="flex: 1;">↶ Undo</button>
                    <button class="btn btn-secondary" id="redoBtn" disabled style="flex: 1;">↷ Redo</button>
                </div>

                <div class="measurements">
                    <div class="measurement-card">
                        <div class="measurement-label">Total Linear Feet</div>
                        <div class="measurement-value" id="totalFeet">0</div>
                        <div class="measurement-unit">feet</div>
                    </div>
                    <div class="measurement-card">
                        <div class="measurement-label">Number of Gates</div>
                        <div class="measurement-value" id="gateCount">0</div>
                        <div class="measurement-unit">gates</div>
                    </div>
                </div>

                <div id="fenceDetails" class="detail-list"></div>
                <div id="gateDetails" class="detail-list"></div>
            </div>

            <div class="panel">
                <div class="panel-title">
                    🎨 Drawing Canvas
                </div>
                <div class="canvas-container">
                    <canvas id="canvas" width="900" height="650"></canvas>
                    <div class="coordinates" id="coords">X: 0, Y: 0</div>
                    <div class="snap-indicator" id="snapInd">● Snapped</div>
                    <div class="gate-visual-indicator" id="gateIndicator">🚪 Single Gate</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class FenceEstimator {
            constructor() {
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.scale = 20;
                this.snapToGrid = true;
                this.gridSize = 20;
                
                this.propertyType = 'single';
                this.currentFenceType = 'PVC';
                this.currentColor = '#000000';
                this.currentGateType = 'single';
                this.currentGateDirection = 'Inside';
                this.currentTool = 'fence';
                
                this.fenceDrawColor = '#3B82F6';
                this.gateDrawColor = '#EF4444';
                
                this.fenceLines = [];
                this.gates = [];
                this.measurements = [];
                
                this.history = [];
                this.historyIndex = -1;
                
                this.isDrawing = false;
                this.currentLine = null;
                this.startPoint = null;
                
                this.initializeEventListeners();
                this.saveState();
                this.render();
                this.updateGateIndicator();
            }

            initializeEventListeners() {
                // Property type selection
                document.querySelectorAll('[data-property-type]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('[data-property-type]').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.propertyType = btn.dataset.propertyType;
                        this.render();
                    });
                });

                // Fence type selection
                document.querySelectorAll('[data-fence-type]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('[data-fence-type]').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        const type = btn.dataset.fenceType;
                        if (type === 'Other') {
                            this.currentFenceType = document.getElementById('fenceTypeOther').value || 'Other';
                        } else {
                            this.currentFenceType = type;
                        }
                    });
                });

                document.getElementById('fenceTypeOther').addEventListener('input', (e) => {
                    if (document.querySelector('[data-fence-type="Other"]').classList.contains('active')) {
                        this.currentFenceType = e.target.value || 'Other';
                    }
                });

                // Color selection
                document.querySelectorAll('.color-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentColor = btn.dataset.color;
                    });
                });

                document.getElementById('colorOther').addEventListener('input', (e) => {
                    this.currentColor = e.target.value;
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                });

                // Gate type selection
                document.querySelectorAll('.gate-type-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.gate-type-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentGateType = btn.dataset.gateType;
                        this.updateGateIndicator();
                    });
                });

                // Gate direction selection
                document.querySelectorAll('.gate-direction-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.gate-direction-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentGateDirection = btn.dataset.direction;
                    });
                });

                // Tool selection
                document.querySelectorAll('.tool-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentTool = btn.dataset.tool;
                        this.updateGateIndicator();
                    });
                });

                // Canvas interactions
                this.canvas.addEventListener('mousedown', (e) => this.handleStart(e));
                this.canvas.addEventListener('mousemove', (e) => this.handleMove(e));
                this.canvas.addEventListener('mouseup', (e) => this.handleEnd(e));
                
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.handleStart(e.touches[0]);
                });
                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    this.handleMove(e.touches[0]);
                });
                this.canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    this.handleEnd(e.changedTouches[0]);
                });

                document.getElementById('snapToggle').addEventListener('change', (e) => {
                    this.snapToGrid = e.target.checked;
                });

                document.getElementById('clearBtn').addEventListener('click', () => this.clearAll());
                document.getElementById('exportBtn').addEventListener('click', () => this.exportToPDF());
                document.getElementById('undoBtn').addEventListener('click', () => this.undo());
                document.getElementById('redoBtn').addEventListener('click', () => this.redo());
            }

            updateGateIndicator() {
                const indicator = document.getElementById('gateIndicator');
                if (this.currentTool === 'gate') {
                    const typeLabel = this.currentGateType === 'single' ? 'Single' : 
                                    this.currentGateType === 'double' ? 'Double' : 'Sliding';
                    indicator.textContent = `🚪 ${typeLabel} Gate`;
                    indicator.classList.add('show');
                } else {
                    indicator.classList.remove('show');
                }
            }

            getPosition(e) {
                const rect = this.canvas.getBoundingClientRect();
                let x = e.clientX - rect.left;
                let y = e.clientY - rect.top;
                
                x = (x / rect.width) * this.canvas.width;
                y = (y / rect.height) * this.canvas.height;
                
                if (this.snapToGrid) {
                    x = Math.round(x / this.gridSize) * this.gridSize;
                    y = Math.round(y / this.gridSize) * this.gridSize;
                    document.getElementById('snapInd').classList.add('active');
                } else {
                    document.getElementById('snapInd').classList.remove('active');
                }
                
                return { x, y };
            }

            handleStart(e) {
                const pos = this.getPosition(e);

                if (this.currentTool === 'delete') {
                    this.deleteElementAt(pos);
                    return;
                }

                this.isDrawing = true;
                this.startPoint = pos;
                this.currentLine = { start: pos, end: pos };
            }

            handleMove(e) {
                const pos = this.getPosition(e);
                
                const feet = this.pixelsToFeet(pos.x, pos.y);
                document.getElementById('coords').textContent = `X: ${feet.x.toFixed(1)}ft, Y: ${feet.y.toFixed(1)}ft`;

                if (this.isDrawing && this.currentLine) {
                    this.currentLine.end = pos;
                    this.render();
                }
            }

            handleEnd(e) {
                if (!this.isDrawing) return;

                const pos = this.getPosition(e);
                const dist = Math.sqrt(Math.pow(pos.x - this.startPoint.x, 2) + Math.pow(pos.y - this.startPoint.y, 2));
                
                if (dist < 5) {
                    this.isDrawing = false;
                    this.currentLine = null;
                    return;
                }

                if (this.currentTool === 'fence') {
                    this.fenceLines.push({ 
                        start: this.startPoint, 
                        end: pos, 
                        type: 'fence',
                        fenceType: this.currentFenceType,
                        color: this.currentColor
                    });
                } else if (this.currentTool === 'gate') {
                    const gateNumber = this.gates.length + 1;
                    this.gates.push({ 
                        start: this.startPoint, 
                        end: pos, 
                        type: 'gate', 
                        gateType: this.currentGateType,
                        direction: this.currentGateDirection,
                        color: this.currentColor,
                        number: gateNumber 
                    });
                } else if (this.currentTool === 'measure') {
                    this.measurements.push({ 
                        start: this.startPoint, 
                        end: pos, 
                        type: 'measurement' 
                    });
                }

                this.isDrawing = false;
                this.currentLine = null;
                this.startPoint = null;
                
                this.saveState();
                this.updateMeasurements();
                this.render();
            }

            deleteElementAt(pos) {
                const threshold = 20;
                let deleted = false;

                for (let i = this.fenceLines.length - 1; i >= 0; i--) {
                    if (this.isPointNearLine(pos, this.fenceLines[i], threshold)) {
                        this.fenceLines.splice(i, 1);
                        deleted = true;
                        break;
                    }
                }

                if (!deleted) {
                    for (let i = this.gates.length - 1; i >= 0; i--) {
                        if (this.isPointNearLine(pos, this.gates[i], threshold)) {
                            this.gates.splice(i, 1);
                            this.gates.forEach((gate, idx) => gate.number = idx + 1);
                            deleted = true;
                            break;
                        }
                    }
                }

                if (!deleted) {
                    for (let i = this.measurements.length - 1; i >= 0; i--) {
                        if (this.isPointNearLine(pos, this.measurements[i], threshold)) {
                            this.measurements.splice(i, 1);
                            deleted = true;
                            break;
                        }
                    }
                }

                if (deleted) {
                    this.saveState();
                    this.updateMeasurements();
                    this.render();
                }
            }

            isPointNearLine(point, line, threshold) {
                const { start, end } = line;
                const A = point.x - start.x;
                const B = point.y - start.y;
                const C = end.x - start.x;
                const D = end.y - start.y;
                const dot = A * C + B * D;
                const lenSq = C * C + D * D;
                let param = lenSq !== 0 ? dot / lenSq : -1;

                let xx, yy;
                if (param < 0) {
                    xx = start.x;
                    yy = start.y;
                } else if (param > 1) {
                    xx = end.x;
                    yy = end.y;
                } else {
                    xx = start.x + param * C;
                    yy = start.y + param * D;
                }

                const dx = point.x - xx;
                const dy = point.y - yy;
                return Math.sqrt(dx * dx + dy * dy) < threshold;
            }

            pixelsToFeet(x, y = null) {
                if (y === null) return x / this.scale;
                return { x: x / this.scale, y: y / this.scale };
            }

            getLineLength(line) {
                const dx = line.end.x - line.start.x;
                const dy = line.end.y - line.start.y;
                const pixels = Math.sqrt(dx * dx + dy * dy);
                return this.pixelsToFeet(pixels);
            }

            updateMeasurements() {
                let totalFeet = 0;
                this.fenceLines.forEach(line => {
                    totalFeet += this.getLineLength(line);
                });

                document.getElementById('totalFeet').textContent = totalFeet.toFixed(1);
                document.getElementById('gateCount').textContent = this.gates.length;

                // Fence details
                const fenceDetails = document.getElementById('fenceDetails');
                if (this.fenceLines.length > 0) {
                    const fenceGroups = {};
                    this.fenceLines.forEach(line => {
                        const key = `${line.fenceType}|${line.color}`;
                        if (!fenceGroups[key]) {
                            fenceGroups[key] = { type: line.fenceType, color: line.color, length: 0 };
                        }
                        fenceGroups[key].length += this.getLineLength(line);
                    });

                    fenceDetails.innerHTML = '<div class="measurement-label" style="margin-bottom: 10px; padding-left: 12px;">Fence Details</div>';
                    Object.values(fenceGroups).forEach(group => {
                        fenceDetails.innerHTML += `
                            <div class="detail-item">
                                <div class="detail-item-header">
                                    <span>${group.type}</span>
                                    <span>${group.length.toFixed(1)} ft</span>
                                </div>
                                <div class="detail-item-meta">
                                    <span style="display: inline-block; width: 12px; height: 12px; border-radius: 2px; background: ${group.color}; border: 1px solid #999;"></span>
                                    Color: ${this.getColorName(group.color)}
                                </div>
                            </div>
                        `;
                    });
                } else {
                    fenceDetails.innerHTML = '';
                }

                // Gate details
                const gateDetails = document.getElementById('gateDetails');
                if (this.gates.length > 0) {
                    gateDetails.innerHTML = '<div class="measurement-label" style="margin-bottom: 10px; padding-left: 12px;">Gate Details</div>';
                    this.gates.forEach(gate => {
                        const width = this.getLineLength(gate).toFixed(1);
                        const typeLabel = gate.gateType === 'single' ? 'Single' : gate.gateType === 'double' ? 'Double' : 'Sliding';
                        gateDetails.innerHTML += `
                            <div class="detail-item">
                                <div class="detail-item-header">
                                    <span>Gate ${gate.number} - ${typeLabel}</span>
                                    <span>${width} ft</span>
                                </div>
                                <div class="detail-item-meta">
                                    Opens: ${gate.direction} | 
                                    <span style="display: inline-block; width: 12px; height: 12px; border-radius: 2px; background: ${gate.color}; border: 1px solid #999;"></span>
                                    ${this.getColorName(gate.color)}
                                </div>
                            </div>
                        `;
                    });
                } else {
                    gateDetails.innerHTML = '';
                }
            }

            getColorName(hexColor) {
                const colorMap = {
                    '#000000': 'Black',
                    '#FFFFFF': 'White',
                    '#3D3026': 'Bronze'
                };
                return colorMap[hexColor.toUpperCase()] || hexColor;
            }

            drawPropertyBackground() {
                this.ctx.save();
                this.ctx.strokeStyle = '#E0E0E0';
                this.ctx.fillStyle = '#F5F5F5';
                this.ctx.lineWidth = 2;

                const centerX = this.canvas.width / 2;
                const centerY = this.canvas.height / 2;

                if (this.propertyType === 'single') {
                    // Single family home - simple house shape
                    const size = 100;
                    // House base
                    this.ctx.fillRect(centerX - size/2, centerY - size/3, size, size * 2/3);
                    this.ctx.strokeRect(centerX - size/2, centerY - size/3, size, size * 2/3);
                    // Roof
                    this.ctx.beginPath();
                    this.ctx.moveTo(centerX - size/2 - 10, centerY - size/3);
                    this.ctx.lineTo(centerX, centerY - size/3 - 40);
                    this.ctx.lineTo(centerX + size/2 + 10, centerY - size/3);
                    this.ctx.closePath();
                    this.ctx.fill();
                    this.ctx.stroke();
                    // Door
                    this.ctx.fillStyle = '#C0C0C0';
                    this.ctx.fillRect(centerX - 15, centerY + 10, 30, 50);
                    this.ctx.strokeRect(centerX - 15, centerY + 10, 30, 50);
                } else if (this.propertyType === 'multifamily') {
                    // Multifamily - long building
                    const width = 200;
                    const height = 60;
                    this.ctx.fillRect(centerX - width/2, centerY - height/2, width, height);
                    this.ctx.strokeRect(centerX - width/2, centerY - height/2, width, height);
                    // Multiple doors
                    this.ctx.fillStyle = '#C0C0C0';
                    for (let i = 0; i < 4; i++) {
                        const doorX = centerX - width/2 + 25 + i * 50;
                        this.ctx.fillRect(doorX, centerY + 10, 20, 30);
                        this.ctx.strokeRect(doorX, centerY + 10, 20, 30);
                    }
                } else if (this.propertyType === 'commercial') {
                    // Commercial - larger building
                    const width = 140;
                    const height = 100;
                    this.ctx.fillRect(centerX - width/2, centerY - height/2, width, height);
                    this.ctx.strokeRect(centerX - width/2, centerY - height/2, width, height);
                    // Entrance
                    this.ctx.fillStyle = '#C0C0C0';
                    this.ctx.fillRect(centerX - 25, centerY + 20, 50, 40);
                    this.ctx.strokeRect(centerX - 25, centerY + 20, 50, 40);
                }

                this.ctx.restore();
            }

            render() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Draw property background
                this.drawPropertyBackground();

                // Draw all fences in BLUE
                this.fenceLines.forEach(line => {
                    this.drawLine(line, this.fenceDrawColor, 5);
                    this.drawLabel(line, this.getLineLength(line).toFixed(1) + ' ft', this.fenceDrawColor);
                    this.drawCircle(line.start, 4, this.fenceDrawColor);
                    this.drawCircle(line.end, 4, this.fenceDrawColor);
                });

                // Draw all gates in RED with visual indicators
                this.gates.forEach(gate => {
                    const dash = gate.gateType === 'sliding' ? [8, 4] : [12, 6];
                    this.drawLine(gate, this.gateDrawColor, 5, dash);
                    this.drawGateIcon(gate);
                    const width = this.getLineLength(gate).toFixed(1);
                    const typeLabel = gate.gateType === 'single' ? 'S' : gate.gateType === 'double' ? 'D' : 'SL';
                    this.drawLabel(gate, `${typeLabel}-${gate.number}: ${width}ft`, this.gateDrawColor);
                    this.drawCircle(gate.start, 6, this.gateDrawColor);
                    this.drawCircle(gate.end, 6, this.gateDrawColor);
                });

                this.measurements.forEach(measurement => {
                    this.drawLine(measurement, '#9333EA', 2, [5, 5]);
                    this.drawLabel(measurement, this.getLineLength(measurement).toFixed(1) + ' ft', '#9333EA');
                    this.drawCircle(measurement.start, 4, '#9333EA');
                    this.drawCircle(measurement.end, 4, '#9333EA');
                });

                if (this.isDrawing && this.currentLine) {
                    let color = this.fenceDrawColor;
                    let width = 5;
                    let dash = [];
                    
                    if (this.currentTool === 'gate') {
                        color = this.gateDrawColor;
                        dash = this.currentGateType === 'sliding' ? [8, 4] : [12, 6];
                    } else if (this.currentTool === 'measure') {
                        color = '#9333EA';
                        width = 2;
                        dash = [5, 5];
                    }
                    
                    this.drawLine(this.currentLine, color, width, dash, 0.6);
                    const length = this.getLineLength(this.currentLine).toFixed(1);
                    this.drawLabel(this.currentLine, length + ' ft', color);
                }
            }

            drawLine(line, color, width, dash = [], alpha = 1) {
                this.ctx.save();
                this.ctx.globalAlpha = alpha;
                this.ctx.strokeStyle = color;
                this.ctx.lineWidth = width;
                this.ctx.lineCap = 'round';
                
                if (dash.length > 0) {
                    this.ctx.setLineDash(dash);
                }
                
                this.ctx.beginPath();
                this.ctx.moveTo(line.start.x, line.start.y);
                this.ctx.lineTo(line.end.x, line.end.y);
                this.ctx.stroke();
                
                this.ctx.restore();
            }

            drawCircle(point, radius, color) {
                this.ctx.save();
                this.ctx.fillStyle = color;
                this.ctx.beginPath();
                this.ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.restore();
            }

            drawGateIcon(gate) {
                const midX = (gate.start.x + gate.end.x) / 2;
                const midY = (gate.start.y + gate.end.y) / 2;
                const size = 30;

                this.ctx.save();
                this.ctx.strokeStyle = this.gateDrawColor;
                this.ctx.fillStyle = 'white';
                this.ctx.lineWidth = 2;

                this.ctx.beginPath();
                this.ctx.arc(midX, midY, size / 2, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.stroke();

                this.ctx.strokeStyle = this.gateDrawColor;
                this.ctx.lineWidth = 2;

                if (gate.gateType === 'single') {
                    this.ctx.strokeRect(midX - 8, midY - 10, 16, 20);
                    this.ctx.beginPath();
                    this.ctx.moveTo(midX, midY - 3);
                    this.ctx.lineTo(midX, midY + 3);
                    this.ctx.stroke();
                } else if (gate.gateType === 'double') {
                    this.ctx.strokeRect(midX - 12, midY - 10, 9, 20);
                    this.ctx.strokeRect(midX + 3, midY - 10, 9, 20);
                    this.ctx.beginPath();
                    this.ctx.moveTo(midX - 4, midY - 3);
                    this.ctx.lineTo(midX - 4, midY + 3);
                    this.ctx.moveTo(midX + 4, midY - 3);
                    this.ctx.lineTo(midX + 4, midY + 3);
                    this.ctx.stroke();
                } else if (gate.gateType === 'sliding') {
                    this.ctx.strokeRect(midX - 8, midY - 10, 16, 20);
                    this.ctx.beginPath();
                    this.ctx.moveTo(midX - 10, midY);
                    this.ctx.lineTo(midX - 3, midY);
                    this.ctx.lineTo(midX - 5, midY - 3);
                    this.ctx.moveTo(midX - 3, midY);
                    this.ctx.lineTo(midX - 5, midY + 3);
                    this.ctx.stroke();
                }

                this.ctx.restore();
            }

            drawLabel(line, text, color) {
                const midX = (line.start.x + line.end.x) / 2;
                const midY = (line.start.y + line.end.y) / 2;

                this.ctx.save();
                this.ctx.font = '700 12px "JetBrains Mono"';
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';

                const metrics = this.ctx.measureText(text);
                const padding = 6;
                this.ctx.fillStyle = 'white';
                this.ctx.strokeStyle = color;
                this.ctx.lineWidth = 2;
                this.ctx.fillRect(
                    midX - metrics.width / 2 - padding,
                    midY - 10,
                    metrics.width + padding * 2,
                    20
                );
                this.ctx.strokeRect(
                    midX - metrics.width / 2 - padding,
                    midY - 10,
                    metrics.width + padding * 2,
                    20
                );

                this.ctx.fillStyle = color;
                this.ctx.fillText(text, midX, midY);
                this.ctx.restore();
            }

            saveState() {
                const state = {
                    fenceLines: JSON.parse(JSON.stringify(this.fenceLines)),
                    gates: JSON.parse(JSON.stringify(this.gates)),
                    measurements: JSON.parse(JSON.stringify(this.measurements))
                };
                
                this.history = this.history.slice(0, this.historyIndex + 1);
                this.history.push(state);
                this.historyIndex++;
                
                if (this.history.length > 50) {
                    this.history.shift();
                    this.historyIndex--;
                }
                
                this.updateUndoRedoButtons();
            }

            undo() {
                if (this.historyIndex > 0) {
                    this.historyIndex--;
                    this.restoreState(this.history[this.historyIndex]);
                }
            }

            redo() {
                if (this.historyIndex < this.history.length - 1) {
                    this.historyIndex++;
                    this.restoreState(this.history[this.historyIndex]);
                }
            }

            restoreState(state) {
                this.fenceLines = JSON.parse(JSON.stringify(state.fenceLines));
                this.gates = JSON.parse(JSON.stringify(state.gates));
                this.measurements = JSON.parse(JSON.stringify(state.measurements));
                this.updateMeasurements();
                this.render();
                this.updateUndoRedoButtons();
            }

            updateUndoRedoButtons() {
                document.getElementById('undoBtn').disabled = this.historyIndex <= 0;
                document.getElementById('redoBtn').disabled = this.historyIndex >= this.history.length - 1;
            }

            clearAll() {
                if (confirm('Clear all drawings? This cannot be undone.')) {
                    this.fenceLines = [];
                    this.gates = [];
                    this.measurements = [];
                    this.saveState();
                    this.updateMeasurements();
                    this.render();
                }
            }

            exportToPDF() {
                let summary = `FENCE WITH STYLE - PROFESSIONAL ESTIMATE\n\n`;
                summary += `Property Type: ${this.propertyType.charAt(0).toUpperCase() + this.propertyType.slice(1)}\n`;
                summary += `Total Fence: ${document.getElementById('totalFeet').textContent} ft\n`;
                summary += `Total Gates: ${this.gates.length}\n\n`;
                
                if (this.fenceLines.length > 0) {
                    summary += `FENCE DETAILS:\n`;
                    const fenceGroups = {};
                    this.fenceLines.forEach(line => {
                        const key = `${line.fenceType}|${line.color}`;
                        if (!fenceGroups[key]) {
                            fenceGroups[key] = { type: line.fenceType, color: line.color, length: 0 };
                        }
                        fenceGroups[key].length += this.getLineLength(line);
                    });
                    Object.values(fenceGroups).forEach(group => {
                        summary += `  ${group.type} (${this.getColorName(group.color)}): ${group.length.toFixed(1)} ft\n`;
                    });
                    summary += '\n';
                }
                
                if (this.gates.length > 0) {
                    summary += `GATE DETAILS:\n`;
                    this.gates.forEach(gate => {
                        const typeLabel = gate.gateType === 'single' ? 'Single' : gate.gateType === 'double' ? 'Double' : 'Sliding';
                        const width = this.getLineLength(gate).toFixed(1);
                        summary += `  Gate ${gate.number} - ${typeLabel} (${this.getColorName(gate.color)}): ${width} ft\n`;
                        summary += `    Opens: ${gate.direction}\n`;
                    });
                }

                alert(summary + '\n\nTip: Use browser Print (Ctrl+P) to save as PDF!');
                window.print();
            }
        }

        const estimator = new FenceEstimator();
    </script>
